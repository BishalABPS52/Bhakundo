services:
  - type: web
    name: premier-league-predictor-api
    runtime: python
    plan: free
    branch: development
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "8000"
